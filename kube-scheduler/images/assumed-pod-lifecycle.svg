<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <style>
    text { font-family: Helvetica Neue, Helvetica, Arial, sans-serif; }
  </style>
  <rect width="1000" height="450" fill="#ffffff"/>
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Assumed Pod Lifecycle - Optimistic Scheduling</text>
  <rect x="50" y="80" width="180" height="100" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Unscheduled</text>
  <text x="140" y="125" text-anchor="middle" font-size="10" fill="#6b7280">Pod in scheduling queue</text>
  <text x="140" y="140" text-anchor="middle" font-size="10" fill="#6b7280">Not in cache</text>
  <text x="140" y="155" text-anchor="middle" font-size="10" fill="#6b7280">Waiting for scheduling</text>
  <line x1="230" y1="130" x2="280" y2="130" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="255" y="120" font-size="9" fill="#6b7280">AssumePod()</text>
  <rect x="280" y="80" width="180" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="370" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">Assumed</text>
  <text x="370" y="125" text-anchor="middle" font-size="10" fill="#6b7280">In cache (podStates)</text>
  <text x="370" y="140" text-anchor="middle" font-size="10" fill="#6b7280">In assumedPods set</text>
  <text x="370" y="155" text-anchor="middle" font-size="10" fill="#6b7280">NodeInfo updated</text>
  <line x1="460" y1="130" x2="510" y2="130" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="485" y="120" font-size="9" fill="#6b7280">Bind() success</text>
  <rect x="510" y="80" width="180" height="100" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="600" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">Bound</text>
  <text x="600" y="125" text-anchor="middle" font-size="10" fill="#6b7280">In cache (podStates)</text>
  <text x="600" y="140" text-anchor="middle" font-size="10" fill="#6b7280">Not in assumedPods</text>
  <text x="600" y="155" text-anchor="middle" font-size="10" fill="#6b7280">API Server confirmed</text>
  <line x1="690" y1="130" x2="740" y2="130" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="715" y="120" font-size="9" fill="#6b7280">Pod running</text>
  <rect x="740" y="80" width="180" height="100" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="830" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">Finished</text>
  <text x="830" y="125" text-anchor="middle" font-size="10" fill="#6b7280">Normal pod lifecycle</text>
  <text x="830" y="140" text-anchor="middle" font-size="10" fill="#6b7280">Eventually removed</text>
  <text x="830" y="155" text-anchor="middle" font-size="10" fill="#6b7280">from cache</text>
  <line x1="370" y1="180" x2="370" y2="220" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="390" y="205" font-size="9" fill="#dc2626">Bind() failed</text>
  <rect x="280" y="220" width="180" height="100" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="370" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Forget</text>
  <text x="370" y="265" text-anchor="middle" font-size="10" fill="#6b7280">ForgetPod() called</text>
  <text x="370" y="280" text-anchor="middle" font-size="10" fill="#6b7280">Remove from assumedPods</text>
  <text x="370" y="295" text-anchor="middle" font-size="10" fill="#6b7280">Rollback NodeInfo</text>
  <path d="M 280 270 L 140 270 L 140 180" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="200" y="260" font-size="9" fill="#6b7280">Back to queue</text>
  <rect x="50" y="360" width="900" height="80" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="70" y="385" font-size="12" font-weight="700" fill="#111827">Why Assume Optimism?</text>
  <text x="70" y="410" font-size="10" fill="#6b7280">1. Avoid race conditions: Pod cant be scheduled to two nodes simultaneously</text>
  <text x="70" y="425" font-size="10" fill="#6b7280">2. Performance: Schedule as if bound, then confirm in background</text>
  <text x="500" y="410" font-size="10" fill="#6b7280">3. Consistency: Cache reflects assumed state during scheduling cycle</text>
  <text x="500" y="425" font-size="10" fill="#6b7280">4. Rollback: If Bind fails, ForgetPod() restores previous state</text>
</svg>