<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  <style>
    text { font-family: Helvetica Neue, Helvetica, Arial, sans-serif; }
  </style>
  <rect width="1200" height="850" fill="#ffffff"/>
  <text x="600" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Kubernetes Scheduler Cache - Deep Architecture (K8s 1.36)</text>
  <rect x="40" y="70" width="220" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">API Server</text>
  <text x="150" y="120" text-anchor="middle" font-size="11" fill="#6b7280">Watch/Notify Events</text>
  <rect x="490" y="70" width="220" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Scheduler Framework</text>
  <text x="600" y="120" text-anchor="middle" font-size="11" fill="#6b7280">Scheduling Cycle</text>
  <rect x="940" y="70" width="220" height="80" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="1050" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Snapshot</text>
  <text x="1050" y="120" text-anchor="middle" font-size="11" fill="#6b7280">Read-only Copy</text>
  <line x1="260" y1="110" x2="360" y2="110" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="310" y="100" font-size="9" fill="#6b7280">Node/Pod Events</text>
  <rect x="40" y="180" width="1120" height="500" rx="8" fill="#f9fafb" stroke="#1e293b" stroke-width="2"/>
  <text x="60" y="210" font-size="16" font-weight="700" fill="#1e293b">Cache Implementation (cacheImpl)</text>
  <rect x="60" y="240" width="280" height="120" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="80" y="265" font-size="12" font-weight="600" fill="#111827">Concurrency Control</text>
  <text x="80" y="285" font-size="10" fill="#6b7280">mu sync.RWMutex</text>
  <text x="80" y="305" font-size="10" fill="#6b7280">- Read: RLock/RUnlock</text>
  <text x="80" y="325" font-size="10" fill="#6b7280">- Write: Lock/Unlock</text>
  <text x="80" y="345" font-size="10" fill="#6b7280">- RLock: concurrent reads</text>
  <rect x="360" y="240" width="400" height="180" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="380" y="265" font-size="12" font-weight="600" fill="#111827">NodeInfo Storage (nodes)</text>
  <text x="380" y="285" font-size="10" fill="#6b7280">map[string]*nodeInfoListItem</text>
  <text x="380" y="305" font-size="10" fill="#6b7280">+ Doubly Linked List for LRU</text>
  <rect x="390" y="330" width="80" height="40" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="430" y="350" text-anchor="middle" font-size="9" fill="#111827">headNode</text>
  <line x1="470" y1="350" x2="520" y2="350" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="520" y="330" width="80" height="40" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="560" y="345" text-anchor="middle" font-size="9" fill="#111827">Node-1</text>
  <text x="560" y="358" text-anchor="middle" font-size="8" fill="#6b7280">info,prev,next</text>
  <line x1="600" y1="350" x2="650" y2="350" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="650" y="330" width="80" height="40" rx="4" fill="#f0fdf4" stroke="#059669" stroke-width="1"/>
  <text x="690" y="345" text-anchor="middle" font-size="9" fill="#111827">Node-2</text>
  <text x="690" y="358" text-anchor="middle" font-size="8" fill="#6b7280">...</text>
  <text x="380" y="395" font-size="9" fill="#6b7280">Recent updates move to HEAD</text>
  <rect x="780" y="240" width="360" height="120" rx="6" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <text x="800" y="265" font-size="12" font-weight="600" fill="#111827">Pod Management</text>
  <text x="800" y="285" font-size="10" fill="#6b7280">podStates: map[key]*podState</text>
  <text x="800" y="305" font-size="10" fill="#6b7280">assumedPods: sets.Set[key]</text>
  <text x="800" y="325" font-size="10" fill="#6b7280">Track: Add/Assume/Update/Remove</text>
  <rect x="60" y="440" width="280" height="100" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="80" y="465" font-size="12" font-weight="600" fill="#111827">Image States</text>
  <text x="80" y="485" font-size="10" fill="#6b7280">imageStates: map[string]*ImageStateSummary</text>
  <text x="80" y="505" font-size="10" fill="#6b7280">Track image availability across nodes</text>
  <rect x="360" y="440" width="400" height="100" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="380" y="465" font-size="12" font-weight="600" fill="#111827">NodeTree - Zone Topology</text>
  <text x="380" y="485" font-size="10" fill="#6b7280">Organize nodes by topology zones</text>
  <text x="380" y="505" font-size="10" fill="#6b7280">Support: region/zone/rack topology</text>
  <rect x="780" y="440" width="360" height="100" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="800" y="465" font-size="12" font-weight="600" fill="#dc2626">PodGroup States (GenericWorkload)</text>
  <text x="800" y="485" font-size="10" fill="#6b7280">podGroupStates: map[key]*podGroupState</text>
  <text x="800" y="505" font-size="10" fill="#6b7280">Group scheduling for related pods</text>
  <rect x="60" y="570" width="1080" height="90" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="80" y="595" font-size="12" font-weight="700" fill="#059669">UpdateSnapshot - Incremental Update Strategy</text>
  <text x="80" y="620" font-size="10" fill="#6b7280">1. Start from headNode (most recent)</text>
  <text x="80" y="635" font-size="10" fill="#6b7280">2. Compare Generation numbers</text>
  <text x="300" y="620" font-size="10" fill="#6b7280">3. Only update changed NodeInfos</text>
  <text x="300" y="635" font-size="10" fill="#6b7280">4. Rebuild lists only when necessary</text>
  <text x="560" y="620" font-size="10" fill="#6b7280">5. Update PVC set if refs changed</text>
  <text x="560" y="635" font-size="10" fill="#6b7280">6. Track PodGroup states</text>
  <text x="780" y="620" font-size="10" fill="#6b7280">Benefit: O(changed) not O(all)</text>
  <text x="780" y="635" font-size="10" fill="#6b7280">Performance: 20-40% improvement</text>
  <text x="60" y="690" font-size="14" font-weight="700" fill="#111827">Core Operations:</text>
  <rect x="60" y="710" width="200" height="80" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="735" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Node Operations</text>
  <text x="160" y="755" text-anchor="middle" font-size="9" fill="#6b7280">AddNode/UpdateNode/RemoveNode</text>
  <text x="160" y="775" text-anchor="middle" font-size="9" fill="#6b7280">+ Image State Management</text>
  <rect x="280" y="710" width="200" height="80" rx="6" fill="#f0fdf4" stroke="#059669" stroke-width="1"/>
  <text x="380" y="735" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Pod Operations</text>
  <text x="380" y="755" text-anchor="middle" font-size="9" fill="#6b7280">AddPod/UpdatePod/RemovePod</text>
  <text x="380" y="775" text-anchor="middle" font-size="9" fill="#6b7280">AssumePod/ForgetPod</text>
  <rect x="500" y="710" width="200" height="80" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="600" y="735" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Snapshot Operations</text>
  <text x="600" y="755" text-anchor="middle" font-size="9" fill="#6b7280">UpdateSnapshot/Snapshot</text>
  <text x="600" y="775" text-anchor="middle" font-size="9" fill="#6b7280">BackupSnapshot/RestoreSnapshot</text>
  <rect x="720" y="710" width="200" height="80" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="820" y="735" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Debug Operations</text>
  <text x="820" y="755" text-anchor="middle" font-size="9" fill="#6b7280">Dump() - Debug snapshot</text>
  <text x="820" y="775" text-anchor="middle" font-size="9" fill="#6b7280">NodeCount/PodCount metrics</text>
  <rect x="940" y="710" width="220" height="80" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="960" y="735" font-size="10" font-weight="600" fill="#111827">Legend:</text>
  <rect x="960" y="745" width="12" height="12" fill="#eff6ff" stroke="#2563eb"/>
  <text x="978" y="755" font-size="9" fill="#6b7280">External</text>
  <rect x="960" y="762" width="12" height="12" fill="#dbeafe" stroke="#2563eb"/>
  <text x="978" y="772" font-size="9" fill="#6b7280">NodeInfo</text>
  <rect x="1050" y="745" width="12" height="12" fill="#f0fdf4" stroke="#059669"/>
  <text x="1068" y="755" font-size="9" fill="#6b7280">PodMgmt</text>
  <rect x="1050" y="762" width="12" height="12" fill="#fef3c7" stroke="#d97706"/>
  <text x="1068" y="772" font-size="9" fill="#6b7280">Scheduling</text>
</svg>