<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>
  <rect width="960" height="650" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">ActiveQ 内部结构详解</text>
  <rect x="40" y="70" width="420" height="480" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="60" y="100" font-size="14" font-weight="700" fill="#111827">activeQueue 数据结构</text>
  <rect x="60" y="120" width="380" height="180" rx="6" fill="#1e293b" stroke="none"/>
  <text x="75" y="145" font-size="11" fill="#a5f3fc" font-family="monospace">type activeQueue struct {</text>
  <text x="85" y="165" font-size="11" fill="#a5f3fc" font-family="monospace">  lock sync.RWMutex</text>
  <text x="85" y="185" font-size="11" fill="#a5f3fc" font-family="monospace">  </text>
  <text x="85" y="205" font-size="11" fill="#86efac" font-family="monospace">  // 堆结构，队头=最高优先级</text>
  <text x="85" y="225" font-size="11" fill="#fef08a" font-family="monospace">  queue *heap.Heap[*framework.PodInfo]</text>
  <text x="85" y="245" font-size="11" fill="#a5f3fc" font-family="monospace">  </text>
  <text x="85" y="265" font-size="11" fill="#86efac" font-family="monospace">  // 条件变量：队列空时阻塞</text>
  <text x="85" y="285" font-size="11" fill="#fef08a" font-family="monospace">  cond sync.Cond</text>
  <text x="85" y="305" font-size="11" fill="#a5f3fc" font-family="monospace">}</text>
  <rect x="60" y="320" width="380" height="150" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="75" y="345" font-size="11" font-weight="600" fill="#111827">关键字段说明：</text>
  <text x="75" y="365" font-size="10" fill="#6b7280">• queue: 堆结构，支持快速插入/删除</text>
  <text x="75" y="385" font-size="10" fill="#6b7280">• cond: 同步原语，队列空时Pop()阻塞</text>
  <text x="75" y="405" font-size="10" fill="#6b7280">• lock: 读写锁，保证并发安全</text>
  <text x="75" y="425" font-size="10" fill="#6b7280">• inFlightPods: 正在调度的Pod集合</text>
  <text x="75" y="445" font-size="10" fill="#6b7280">• closed: 队列是否已关闭</text>
  <text x="700" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">堆(Heap)结构可视化</text>
  <rect x="500" y="130" width="420" height="300" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <rect x="620" y="160" width="160" height="50" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="700" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Pod-1 (优先级: 100)</text>
  <line x1="700" y1="210" x2="580" y2="260" stroke="#059669" stroke-width="2"/>
  <line x1="700" y1="210" x2="820" y2="260" stroke="#059669" stroke-width="2"/>
  <rect x="500" y="260" width="160" height="50" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="580" y="290" text-anchor="middle" font-size="11" fill="#111827">Pod-2 (优先级: 90)</text>
  <rect x="740" y="260" width="160" height="50" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="820" y="290" text-anchor="middle" font-size="11" fill="#111827">Pod-3 (优先级: 85)</text>
  <line x1="580" y1="310" x2="520" y2="350" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="580" y1="310" x2="620" y2="350" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="820" y1="310" x2="820" y2="350" stroke="#6b7280" stroke-width="1.5"/>
  <rect x="460" y="350" width="120" height="40" rx="4" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="520" y="375" text-anchor="middle" font-size="9" fill="#6b7280">Pod-4 (80)</text>
  <rect x="560" y="350" width="120" height="40" rx="4" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="620" y="375" text-anchor="middle" font-size="9" fill="#6b7280">Pod-5 (75)</text>
  <rect x="760" y="350" width="120" height="40" rx="4" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="820" y="375" text-anchor="middle" font-size="9" fill="#6b7280">...</text>
  <text x="700" y="420" text-anchor="middle" font-size="10" fill="#6b7280">堆顶 = 最高优先级 = 下一个被调度</text>
  <rect x="40" y="570" width="880" height="70" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="60" y="595" font-size="12" font-weight="700" fill="#111827">Pop() 操作流程：</text>
  <text x="200" y="595" font-size="10" fill="#2563eb">1. 检查队列是否为空</text>
  <text x="340" y="595" font-size="10" fill="#2563eb">→ 2. 为空则 cond.Wait() 阻塞</text>
  <text x="530" y="595" font-size="10" fill="#2563eb">→ 3. 非空则 heap.Pop()</text>
  <text x="720" y="595" font-size="10" fill="#2563eb">→ 4. 返回优先级最高的Pod</text>
  <text x="60" y="615" font-size="9" fill="#6b7280">Add() 调用 broadcast() 唤醒阻塞的 Pop()</text>
</svg>