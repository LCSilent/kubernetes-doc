<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>
  <style>
    text { font-family: Helvetica Neue, Helvetica, Arial, sans-serif; }
  </style>
  <rect width="1200" height="750" fill="#ffffff"/>
  <text x="600" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">NodeInfo Data Structure - Class Diagram</text>
  <text x="600" y="55" text-anchor="middle" font-size="12" fill="#6b7280">Kubernetes Scheduler Framework - Internal/External Representation</text>
  <rect x="40" y="90" width="340" height="380" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">NodeInfo (framework.NodeInfo)</text>
  <text x="210" y="135" text-anchor="middle" font-size="10" fill="#6b7280">External Representation - Used by Plugins</text>
  <line x1="40" y1="145" x2="380" y2="145" stroke="#2563eb" stroke-width="1"/>
  <text x="55" y="165" font-size="11" font-weight="600" fill="#111827">Core Fields:</text>
  <text x="55" y="185" font-size="10" fill="#6b7280">- node *v1.Node</text>
  <text x="55" y="200" font-size="10" fill="#6b7280">- nodeName string</text>
  <text x="55" y="215" font-size="10" fill="#6b7280">- pods []*v1.Pod</text>
  <text x="55" y="230" font-size="10" fill="#6b7280">- Generation int64</text>
  <text x="55" y="255" font-size="11" font-weight="600" fill="#111827">Resource Tracking:</text>
  <text x="55" y="275" font-size="10" fill="#6b7280">- allocatable ResourceList</text>
  <text x="55" y="290" font-size="10" fill="#6b7280">- used ResourceList</text>
  <text x="55" y="305" font-size="10" fill="#6b7280">- available ResourceList (computed)</text>
  <text x="55" y="330" font-size="11" font-weight="600" fill="#111827">Scheduling Info:</text>
  <text x="55" y="350" font-size="10" fill="#6b7280">- taints []v1.Taint</text>
  <text x="55" y="365" font-size="10" fill="#6b7280">- nodeInfo.Node.Affinity</text>
  <text x="55" y="380" font-size="10" fill="#6b7280">- ImageStates map[string]*ImageStateSummary</text>
  <text x="55" y="405" font-size="11" font-weight="600" fill="#111827">Affinity Tracking:</text>
  <text x="55" y="425" font-size="10" fill="#6b7280">- PodsWithAffinity []*v1.Pod</text>
  <text x="55" y="440" font-size="10" fill="#6b7280">- PodsWithRequiredAntiAffinity []*v1.Pod</text>
  <text x="55" y="465" font-size="11" font-weight="600" fill="#111827">PVC Tracking:</text>
  <text x="55" y="485" font-size="10" fill="#6b7280">- PVCRefCounts map[string]int</text>
  <line x1="40" y1="500" x2="380" y2="500" stroke="#2563eb" stroke-width="1"/>
  <text x="55" y="520" font-size="11" font-weight="600" fill="#111827">Key Methods:</text>
  <text x="55" y="540" font-size="10" fill="#059669">+ Allocatable() ResourceList</text>
  <text x="55" y="555" font-size="10" fill="#059669">+ Used() ResourceList</text>
  <text x="55" y="570" font-size="10" fill="#059669">+ Available() ResourceList</text>
  <text x="55" y="585" font-size="10" fill="#059669">+ AddPod(pod)</text>
  <text x="55" y="600" font-size="10" fill="#059669">+ RemovePod(pod)</text>
  <text x="55" y="615" font-size="10" fill="#059669">+ SetNode(node)</text>
  <text x="55" y="630" font-size="10" fill="#059669">+ Clone() NodeInfo</text>
  <text x="55" y="645" font-size="10" fill="#059669">+ SnapshotConcrete() *NodeInfo</text>
  <rect x="400" y="90" width="380" height="200" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="420" y="115" font-size="14" font-weight="700" fill="#059669">Resource Calculation</text>
  <text x="420" y="140" font-size="11" font-weight="600" fill="#111827">Available = Allocatable - Used</text>
  <rect x="420" y="150" width="340" height="60" rx="4" fill="#1e293b"/>
  <text x="435" y="170" font-size="10" fill="#86efac" font-family="monospace">for key, quantity := range allocatable {</text>
  <text x="445" y="185" font-size="10" fill="#86efac" font-family="monospace">  if used, ok := used[key]; ok {</text>
  <text x="455" y="200" font-size="10" fill="#86efac" font-family="monospace">    result[key] = quantity - used</text>
  <text x="435" y="215" font-size="10" fill="#86efac" font-family="monospace">  } else { result[key] = quantity }</text>
  <text x="435" y="230" font-size="10" fill="#86efac" font-family="monospace">}</text>
  <text x="420" y="260" font-size="10" fill="#6b7280">ResourceList = map[v1.ResourceName]resource.Quantity</text>
  <text x="420" y="275" font-size="10" fill="#6b7280">Supports: cpu, memory, pods, ephemeral-storage, hugepages,</text>
  <text x="420" y="290" font-size="10" fill="#6b7280">           nvidia.com/gpu, etc.</text>
  <rect x="400" y="310" width="380" height="200" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="420" y="335" font-size="14" font-weight="700" fill="#d97706">Pod Management Operations</text>
  <text x="420" y="360" font-size="11" font-weight="600" fill="#111827">AddPod(pod *v1.Pod):</text>
  <text x="420" y="380" font-size="10" fill="#6b7280">1. Append pod to pods[]</text>
  <text x="420" y="395" font-size="10" fill="#6b7280">2. Add pod resources to used</text>
  <text x="420" y="410" font-size="10" fill="#6b7280">3. Update PVCRefCounts</text>
  <text x="420" y="425" font-size="10" fill="#6b7280">4. Check affinity conditions</text>
  <text x="420" y="450" font-size="11" font-weight="600" fill="#111827">RemovePod(pod *v1.Pod):</text>
  <text x="420" y="470" font-size="10" fill="#6b7280">1. Remove pod from pods[]</text>
  <text x="420" y="485" font-size="10" fill="#6b7280">2. Subtract pod resources from used</text>
  <text x="420" y="500" font-size="10" fill="#6b7280">3. Update PVCRefCounts</text>
  <rect x="400" y="530" width="380" height="180" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="420" y="555" font-size="14" font-weight="700" fill="#7c3aed">PVC Reference Counting</text>
  <text x="420" y="580" font-size="10" fill="#6b7280">PVCRefCounts: map["namespace/name"]int</text>
  <text x="420" y="600" font-size="10" fill="#6b7280">Used for Storage Capacity Scheduling</text>
  <text x="420" y="620" font-size="10" fill="#6b7280">Track how many pods use each PVC</text>
  <text x="420" y="640" font-size="10" fill="#6b7280">Snapshot copied to Snapshot.usedPVCSet</text>
  <text x="420" y="660" font-size="10" fill="#6b7280">Used by Volume Zone Plugin</text>
  <text x="420" y="680" font-size="10" fill="#6b7280">CapacityCheck: sum(PVCs size) <= Node allocatable</text>
  <rect x="800" y="90" width="360" height="300" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="980" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Snapshot (Read-only Copy)</text>
  <text x="980" y="135" text-anchor="middle" font-size="10" fill="#6b7280">Generated per scheduling cycle</text>
  <line x1="800" y1="145" x2="1160" y2="145" stroke="#dc2626" stroke-width="1"/>
  <text x="815" y="165" font-size="11" font-weight="600" fill="#111827">Fields:</text>
  <text x="815" y="185" font-size="10" fill="#6b7280">- nodeInfoMap map[string]*NodeInfo</text>
  <text x="815" y="200" font-size="10" fill="#6b7280">- nodeInfoList []NodeInfo</text>
  <text x="815" y="215" font-size="10" fill="#6b7280">- havePodsWithAffinityNodeInfoList []NodeInfo</text>
  <text x="815" y="230" font-size="10" fill="#6b7280">- havePodsWithRequiredAntiAffinityNodeInfoList</text>
  <text x="815" y="245" font-size="10" fill="#6b7280">- usedPVCSet sets.Set[string]</text>
  <text x="815" y="260" font-size="10" fill="#6b7280">- generation int64</text>
  <text x="815" y="275" font-size="10" fill="#6b7280">- assumedPods map[string]*v1.Pod</text>
  <text x="815" y="290" font-size="10" fill="#6b7280">- podGroupStates map[key]*podGroupStateSnapshot</text>
  <line x1="800" y1="300" x2="1160" y2="300" stroke="#dc2626" stroke-width="1"/>
  <text x="815" y="320" font-size="11" font-weight="600" fill="#111827">Methods:</text>
  <text x="815" y="340" font-size="10" fill="#059669">+ NodeInfo(name) (NodeInfo, bool)</text>
  <text x="815" y="355" font-size="10" fill="#059669">+ NumNodes() int</text>
  <text x="815" y="370" font-size="10" fill="#059669">+ List() []NodeInfo</text>
  <text x="815" y="385" font-size="10" fill="#059669">+ HavePodsWithAffinity() []NodeInfo</text>
  <line x1="380" y1="280" x2="800" y2="280" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-orange)"/>
  <text x="590" y="270" text-anchor="middle" font-size="9" fill="#ea580c">Snapshot() creates deep copy via Clone()</text>
  <rect x="800" y="410" width="360" height="130" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="820" y="435" font-size="12" font-weight="700" fill="#111827">ImageStateSummary</text>
  <text x="820" y="460" font-size="10" fill="#6b7280">Tracks: image name -> available nodes</text>
  <text x="820" y="480" font-size="10" fill="#6b7280">Size: image size in bytes</text>
  <text x="820" y="500" font-size="10" fill="#6b7280">Nodes: set of node names with this image</text>
  <text x="820" y="520" font-size="10" fill="#6b7280">Used by ImageLocality Plugin</text>
  <rect x="800" y="560" width="360" height="150" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="820" y="585" font-size="12" font-weight="700" fill="#dc2626">Generation Number Tracking</text>
  <text x="820" y="610" font-size="10" fill="#6b7280">Generation: incremented on each update</text>
  <text x="820" y="630" font-size="10" fill="#6b7280">Incremental Update: compare generation numbers</text>
  <text x="820" y="650" font-size="10" fill="#6b7280">Only update NodeInfos with generation > snapshot.generation</text>
  <text x="820" y="670" font-size="10" fill="#6b7280">Performance: O(changed) not O(all nodes)</text>
  <text x="820" y="690" font-size="10" fill="#dc2626" font-weight="600">Benefit: 20-40% snapshot update speedup</text>
  <rect x="40" y="720" width="1120" height="25" rx="4" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="60" y="738" font-size="10" font-weight="600" fill="#111827">Legend:</text>
  <rect x="120" y="725" width="12" height="12" fill="#eff6ff" stroke="#2563eb"/>
  <text x="138" y="736" font-size="9" fill="#6b7280">External API</text>
  <rect x="220" y="725" width="12" height="12" fill="#f0fdf4" stroke="#059669"/>
  <text x="238" y="736" font-size="9" fill="#6b7280">Resource Calc</text>
  <rect x="330" y="725" width="12" height="12" fill="#fee2e2" stroke="#dc2626"/>
  <text x="348" y="736" font-size="9" fill="#6b7280">Snapshot</text>
  <rect x="420" y="725" width="12" height="12" fill="#fef3c7" stroke="#d97706"/>
  <text x="438" y="736" font-size="9" fill="#6b7280">Pod Mgmt</text>
  <line x1="520" y1="731" x2="550" y2="731" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="558" y="736" font-size="9" fill="#6b7280">Snapshot Clone</text>
</svg>