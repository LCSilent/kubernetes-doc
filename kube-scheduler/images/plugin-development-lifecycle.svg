<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft YaHei', 'SimHei', sans-serif; }
  </style>
  <rect width="1200" height="900" fill="#ffffff"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#111827">调度插件开发完整生命周期</text>
  
  <!-- 开发阶段 -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="1100" height="120" rx="12" ry="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#166534">第一阶段：开发阶段</text>
    
    <g transform="translate(30, 50)">
      <circle cx="50" cy="25" r="20" fill="#16a34a"/>
      <text x="50" y="30" text-anchor="middle" font-size="14" fill="white">1</text>
      <text x="100" y="25" text-anchor="start" font-size="13" font-weight="bold" fill="#111827">定义需求</text>
      <text x="100" y="45" text-anchor="start" font-size="11" fill="#6b7280">明确要解决什么问题</text>
    </g>
    
    <g transform="translate(280, 50)">
      <circle cx="50" cy="25" r="20" fill="#16a34a"/>
      <text x="50" y="30" text-anchor="middle" font-size="14" fill="white">2</text>
      <text x="100" y="25" text-anchor="start" font-size="13" font-weight="bold" fill="#111827">选择扩展点</text>
      <text x="100" y="45" text-anchor="start" font-size="11" fill="#6b7280">Filter? Score? PreFilter?</text>
    </g>
    
    <g transform="translate(530, 50)">
      <circle cx="50" cy="25" r="20" fill="#16a34a"/>
      <text x="50" y="30" text-anchor="middle" font-size="14" fill="white">3</text>
      <text x="100" y="25" text-anchor="start" font-size="13" font-weight="bold" fill="#111827">编写代码</text>
      <text x="100" y="45" text-anchor="start" font-size="11" fill="#6b7280">实现 Plugin 接口</text>
    </g>
    
    <g transform="translate(780, 50)">
      <circle cx="50" cy="25" r="20" fill="#16a34a"/>
      <text x="50" y="30" text-anchor="middle" font-size="14" fill="white">4</text>
      <text x="100" y="25" text-anchor="start" font-size="13" font-weight="bold" fill="#111827">单元测试</text>
      <text x="100" y="45" text-anchor="start" font-size="11" fill="#6b7280">验证逻辑正确性</text>
    </g>
  </g>
  
  <!-- 箭头1 -->
  <path d="M 600 200 L 600 240" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
  
  <!-- 编译阶段 -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="1100" height="120" rx="12" ry="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1d4ed8">第二阶段：编译打包</text>
    
    <g transform="translate(100, 50)">
      <rect x="0" y="0" width="250" height="60" rx="8" ry="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
      <text x="125" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">go build -buildmode=plugin</text>
      <text x="125" y="50" text-anchor="middle" font-size="11" fill="#6b7280">编译为 .so 插件文件</text>
    </g>
    
    <text x="400" y="80" text-anchor="middle" font-size="30" fill="#9ca3af">→</text>
    
    <g transform="translate(450, 50)">
      <rect x="0" y="0" width="250" height="60" rx="8" ry="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
      <text x="125" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">上传到插件目录</text>
      <text x="125" y="50" text-anchor="middle" font-size="11" fill="#6b7280">/var/lib/kube-scheduler/plugins/</text>
    </g>
    
    <text x="750" y="80" text-anchor="middle" font-size="30" fill="#9ca3af">→</text>
    
    <g transform="translate(800, 50)">
      <rect x="0" y="0" width="250" height="60" rx="8" ry="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
      <text x="125" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">配置调度器</text>
      <text x="125" y="50" text-anchor="middle" font-size="11" fill="#6b7280">更新 KubeSchedulerConfiguration</text>
    </g>
  </g>
  
  <!-- 箭头2 -->
  <path d="M 600 370 L 600 410" stroke="#2563eb" stroke-width="3" fill="none" marker-end="url(#arrow-blue)"/>
  
  <!-- 运行阶段 -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="1100" height="200" rx="12" ry="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#92400e">第三阶段：运行与调度周期</text>
    
    <!-- 调度周期流程 -->
    <g transform="translate(50, 50)">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="120" height="50" rx="25" ry="25" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
        <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">PreFilter</text>
        <text x="60" y="45" text-anchor="middle" font-size="10" fill="#6b7280">预处理</text>
      </g>
      
      <text x="135" y="28" text-anchor="middle" font-size="20" fill="#9ca3af">→</text>
      
      <g transform="translate(150, 0)">
        <rect x="0" y="0" width="120" height="50" rx="25" ry="25" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
        <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Filter</text>
        <text x="60" y="45" text-anchor="middle" font-size="10" fill="#6b7280">过滤节点</text>
      </g>
      
      <text x="285" y="28" text-anchor="middle" font-size="20" fill="#9ca3af">→</text>
      
      <g transform="translate(300, 0)">
        <rect x="0" y="0" width="120" height="50" rx="25" ry="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
        <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97706">Score</text>
        <text x="60" y="45" text-anchor="middle" font-size="10" fill="#6b7280">评分</text>
      </g>
      
      <text x="435" y="28" text-anchor="middle" font-size="20" fill="#9ca3af">→</text>
      
      <g transform="translate(450, 0)">
        <rect x="0" y="0" width="120" height="50" rx="25" ry="25" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
        <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">Reserve</text>
        <text x="60" y="45" text-anchor="middle" font-size="10" fill="#6b7280">预留资源</text>
      </g>
      
      <text x="585" y="28" text-anchor="middle" font-size="20" fill="#9ca3af">→</text>
      
      <g transform="translate(600, 0)">
        <rect x="0" y="0" width="120" height="50" rx="25" ry="25" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
        <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">PreBind</text>
        <text x="60" y="45" text-anchor="middle" font-size="10" fill="#6b7280">预绑定</text>
      </g>
      
      <text x="735" y="28" text-anchor="middle" font-size="20" fill="#9ca3af">→</text>
      
      <g transform="translate(750, 0)">
        <rect x="0" y="0" width="120" height="50" rx="25" ry="25" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
        <text x="60" y="28" text-anchor="middle" font-size="12" font-weight="bold" fill="#db2777">Bind</text>
        <text x="60" y="45" text-anchor="middle" font-size="10" fill="#6b7280">绑定</text>
      </g>
    </g>
    
    <text x="550" y="140" text-anchor="middle" font-size="13" fill="#6b7280">每个 Pod 调度都会经过这些扩展点，你的插件会在相应的阶段被调用</text>
  </g>
  
  <!-- 箭头3 -->
  <path d="M 600 620 L 600 660" stroke="#d97706" stroke-width="3" fill="none" marker-end="url(#arrow-orange)"/>
  
  <!-- 运维阶段 -->
  <g transform="translate(50, 670)">
    <rect x="0" y="0" width="1100" height="120" rx="12" ry="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">第四阶段：运维监控</text>
    
    <g transform="translate(100, 50)">
      <rect x="0" y="0" width="200" height="60" rx="8" ry="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
      <text x="100" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">日志监控</text>
      <text x="100" y="45" text-anchor="middle" font-size="11" fill="#6b7280">kubectl logs</text>
    </g>
    
    <g transform="translate(350, 50)">
      <rect x="0" y="0" width="200" height="60" rx="8" ry="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
      <text x="100" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">Metrics 指标</text>
      <text x="100" y="45" text-anchor="middle" font-size="11" fill="#6b7280">Prometheus 监控</text>
    </g>
    
    <g transform="translate(600, 50)">
      <rect x="0" y="0" width="200" height="60" rx="8" ry="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
      <text x="100" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">事件追踪</text>
      <text x="100" y="45" text-anchor="middle" font-size="11" fill="#6b7280">kubectl describe pod</text>
    </g>
    
    <g transform="translate(850, 50)">
      <rect x="0" y="0" width="200" height="60" rx="8" ry="8" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
      <text x="100" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">热更新</text>
      <text x="100" y="45" text-anchor="middle" font-size="11" fill="#6b7280">滚动更新调度器</text>
    </g>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(50, 820)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#111827">关键提示：</text>
    <g transform="translate(0, 20)">
      <circle cx="10" cy="10" r="5" fill="#16a34a"/>
      <text x="25" y="14" font-size="12" fill="#6b7280">开发阶段决定插件架构</text>
    </g>
    <g transform="translate(200, 20)">
      <circle cx="10" cy="10" r="5" fill="#2563eb"/>
      <text x="25" y="14" font-size="12" fill="#6b7280">编译阶段需要兼容版本</text>
    </g>
    <g transform="translate(450, 20)">
      <circle cx="10" cy="10" r="5" fill="#d97706"/>
      <text x="25" y="14" font-size="12" fill="#6b7280">运行时注意性能影响</text>
    </g>
    <g transform="translate(700, 20)">
      <circle cx="10" cy="10" r="5" fill="#dc2626"/>
      <text x="25" y="14" font-size="12" fill="#6b7280">运维阶段需要完整监控</text>
    </g>
  </g>
  
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>
</svg>
