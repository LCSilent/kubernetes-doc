<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>
  <rect width="960" height="600" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">指数退避算法 (Exponential Backoff)</text>
  <rect x="40" y="70" width="380" height="400" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="60" y="100" font-size="14" font-weight="700" fill="#111827">算法实现</text>
  <rect x="60" y="120" width="340" height="150" rx="6" fill="#1e293b" stroke="none"/>
  <text x="75" y="145" font-size="10" fill="#86efac" font-family="monospace">func calculateBackoffDuration(count int)</text>
  <text x="75" y="165" font-size="10" fill="#86efac" font-family="monospace">  time.Duration {</text>
  <text x="75" y="185" font-size="10" fill="#a5f3fc" font-family="monospace">  if count == 0 {</text>
  <text x="95" y="205" font-size="10" fill="#a5f3fc" font-family="monospace">    return 0</text>
  <text x="75" y="225" font-size="10" fill="#a5f3fc" font-family="monospace">  }</text>
  <text x="75" y="245" font-size="10" fill="#fef08a" font-family="monospace">  shift := count - 1</text>
  <text x="75" y="265" font-size="10" fill="#a5f3fc" font-family="monospace">  return time.Duration(</text>
    <text x="95" y="285" font-size="10" fill="#fef08a" font-family="monospace">      initialBackoff << shift)</text>
  <rect x="60" y="290" width="340" height="100" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="75" y="315" font-size="11" font-weight="600" fill="#ea580c">常量配置：</text>
  <text x="75" y="335" font-size="10" fill="#6b7280">• podInitialBackoff = 1秒</text>
  <text x="75" y="355" font-size="10" fill="#6b7280">• podMaxBackoff = 10秒</text>
  <text x="75" y="375" font-size="10" fill="#6b7280">• 超过最大值时取最大值</text>
  <text x="700" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">退避时间增长曲线</text>
  <rect x="450" y="130" width="480" height="340" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <line x1="490" y1="160" x2="490" y2="440" stroke="#6b7280" stroke-width="2"/>
  <text x="475" y="165" font-size="10" fill="#6b7280">10s</text>
  <text x="475" y="225" font-size="10" fill="#6b7280">8s</text>
  <text x="475" y="285" font-size="10" fill="#6b7280">4s</text>
  <text x="475" y="345" font-size="10" fill="#6b7280">2s</text>
  <text x="475" y="405" font-size="10" fill="#6b7280">1s</text>
  <text x="465" y="455" font-size="9" fill="#6b7280">0s</text>
  <line x1="490" y1="440" x2="890" y2="440" stroke="#6b7280" stroke-width="2"/>
  <text x="520" y="460" text-anchor="middle" font-size="9" fill="#6b7280">第1次</text>
  <text x="610" y="460" text-anchor="middle" font-size="9" fill="#6b7280">第2次</text>
  <text x="700" y="460" text-anchor="middle" font-size="9" fill="#6b7280">第3次</text>
  <text x="790" y="460" text-anchor="middle" font-size="9" fill="#6b7280">第4次+</text>
  <circle cx="520" cy="405" r="8" fill="#059669"/>
  <text x="520" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">1s</text>
  <circle cx="610" cy="345" r="8" fill="#059669"/>
  <line x1="520" y1="405" x2="610" y2="345" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="610" y="335" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">2s</text>
  <circle cx="700" cy="285" r="8" fill="#059669"/>
  <line x1="610" y1="345" x2="700" y2="285" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="700" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">4s</text>
  <circle cx="790" cy="225" r="8" fill="#059669"/>
  <line x1="700" y1="285" x2="790" y2="225" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="790" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">8s</text>
  <line x1="490" y1="160" x2="890" y2="160" stroke="#dc2626" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="895" y="165" font-size="9" fill="#dc2626">最大10s</text>
  <rect x="40" y="490" width="880" height="100" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="60" y="515" font-size="12" font-weight="700" fill="#111827">为什么需要指数退避？</text>
  <text x="60" y="540" font-size="10" fill="#6b7280">1. 避免刚失败马上又试，造成死循环浪费资源</text>
  <text x="60" y="560" font-size="10" fill="#6b7280">2. 给集群恢复时间（如节点加入、Pod删除）</text>
  <text x="60" y="580" font-size="10" fill="#6b7280">3. 指数增长让后续重试间隔越来越长，最终趋于稳定</text>
</svg>