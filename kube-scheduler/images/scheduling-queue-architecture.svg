<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <style>
    text { font-family: Helvetica Neue, Helvetica, Arial, sans-serif; }
  </style>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Kubernetes Scheduler PriorityQueue - Three-Tier Architecture</text>
  <rect x="380" y="70" width="200" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Scheduler Framework</text>
  <line x1="480" y1="130" x2="480" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="440" y="140" width="80" height="20" fill="#ffffff" opacity="0.95"/>
  <text x="480" y="154" text-anchor="middle" font-size="11" fill="#6b7280">Pod Creation</text>
  <rect x="40" y="190" width="880" height="140" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="60" y="215" font-size="12" font-weight="700" fill="#059669">ActiveQ - Active Queue</text>
  <text x="60" y="230" font-size="10" fill="#6b7280">- Heap structure with priority ordering</text>
  <text x="60" y="245" font-size="10" fill="#6b7280">- Head = Highest priority Pod</text>
  <text x="60" y="260" font-size="10" fill="#6b7280">- Cond variable for blocking wait</text>
  <text x="60" y="275" font-size="10" fill="#6b7280">- Pop() retrieves next Pod</text>
  <rect x="680" y="210" width="220" height="100" rx="6" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="790" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Heap Structure</text>
  <rect x="710" y="250" width="160" height="50" rx="4" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="790" y="272" text-anchor="middle" font-size="10" fill="#059669">Pod-1 (Priority 1)</text>
  <text x="790" y="285" text-anchor="middle" font-size="9" fill="#6b7280">Pod-2 (Priority 2)</text>
  <text x="790" y="298" text-anchor="middle" font-size="9" fill="#6b7280">...</text>
  <line x1="150" y1="330" x2="150" y2="370" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="110" y="345" width="80" height="20" fill="#ffffff" opacity="0.95"/>
  <text x="150" y="359" text-anchor="middle" font-size="10" fill="#ea580c">Scheduling Failed</text>
  <line x1="350" y1="330" x2="350" y2="370" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="310" y="345" width="80" height="20" fill="#ffffff" opacity="0.95"/>
  <text x="350" y="359" text-anchor="middle" font-size="10" fill="#dc2626">Unschedulable</text>
  <path d="M 480 460 L 480 500 L 200 500 L 200 330" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>
  <rect x="385" y="460" width="90" height="20" fill="#ffffff" opacity="0.95"/>
  <text x="430" y="474" text-anchor="middle" font-size="10" fill="#6b7280">Backoff Complete</text>
  <rect x="40" y="370" width="880" height="140" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="60" y="395" font-size="12" font-weight="700" fill="#ea580c">BackoffQ - Backoff Queue</text>
  <text x="60" y="410" font-size="10" fill="#6b7280">- podBackoffQ: Scheduling policy rejection</text>
  <text x="60" y="425" font-size="10" fill="#6b7280">- podErrorBackoffQ: API errors</text>
  <text x="60" y="440" font-size="10" fill="#6b7280">- Exponential backoff: 1s - 2s - 4s - 8s - 10s</text>
  <text x="60" y="455" font-size="10" fill="#6b7280">- Background goroutine periodic check</text>
  <rect x="680" y="390" width="220" height="100" rx="6" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="790" y="415" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Backoff Time</text>
  <rect x="700" y="430" width="180" height="50" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
  <text x="790" y="452" text-anchor="middle" font-size="10" fill="#ea580c">Retry 1: 1 second</text>
  <text x="790" y="465" text-anchor="middle" font-size="10" fill="#ea580c">Retry 2: 2 seconds</text>
  <text x="790" y="478" text-anchor="middle" font-size="9" fill="#6b7280">...</text>
  <rect x="40" y="530" width="880" height="140" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="60" y="555" font-size="12" font-weight="700" fill="#dc2626">UnschedulablePodPool - Unschedulable Pool</text>
  <text x="60" y="570" font-size="10" fill="#6b7280">- Map structure for fast lookup</text>
  <text x="60" y="585" font-size="10" fill="#6b7280">- Gated vs Unschedulable states</text>
  <text x="60" y="600" font-size="10" fill="#6b7280">- Maximum 5 minutes wait</text>
  <text x="60" y="615" font-size="10" fill="#6b7280">- Retry when cluster changes</text>
  <rect x="680" y="540" width="220" height="100" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="790" y="565" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Pod Map</text>
  <rect x="700" y="580" width="180" height="50" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="790" y="602" text-anchor="middle" font-size="10" fill="#dc2626">Pod-A: Gated</text>
  <text x="790" y="615" text-anchor="middle" font-size="10" fill="#dc2626">Pod-B: Unschedulable</text>
  <text x="790" y="628" text-anchor="middle" font-size="9" fill="#6b7280">...</text>
  <path d="M 550 600 L 600 600 L 600 530 L 550 530" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="575" y="575" text-anchor="middle" font-size="9" fill="#6b7280">After 5 minutes</text>
  <g transform="translate(40, 650)">
    <text x="0" y="0" font-size="10" fill="#111827" font-weight="600">Legend:</text>
    <line x1="60" y1="-4" x2="90" y2="-4" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="95" y="0" font-size="9" fill="#6b7280">Pod Creation</text>
    <line x1="160" y1="-4" x2="190" y2="-4" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="195" y="0" font-size="9" fill="#6b7280">Scheduling Failed</text>
    <line x1="260" y1="-4" x2="290" y2="-4" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="295" y="0" font-size="9" fill="#6b7280">Unschedulable</text>
    <line x1="360" y1="-4" x2="390" y2="-4" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>
    <text x="395" y="0" font-size="9" fill="#6b7280">Backoff Complete</text>
  </g>
</svg>