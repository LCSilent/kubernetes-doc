<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>
  <rect width="960" height="800" fill="#ffffff"/>
  <text x="480" y="40" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Pod 完整生命周期旅程</text>
  <text x="200" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#059669">成功路径</text>
  <rect x="80" y="100" width="240" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">1. Pod 创建</text>
  <text x="200" y="148" text-anchor="middle" font-size="10" fill="#6b7280">kubectl create deployment</text>
  <text x="200" y="163" text-anchor="middle" font-size="10" fill="#6b7280">spec.nodeName = 空</text>
  <line x1="200" y1="170" x2="200" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="80" y="210" width="240" height="70" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="200" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">2. 进入 ActiveQ</text>
  <text x="200" y="258" text-anchor="middle" font-size="10" fill="#6b7280">按优先级排序入队</text>
  <text x="200" y="273" text-anchor="middle" font-size="10" fill="#6b7280">等待调度器 Pop()</text>
  <line x1="200" y1="280" x2="200" y2="320" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="80" y="320" width="240" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="200" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">3. 调度器 Pop()</text>
  <text x="200" y="368" text-anchor="middle" font-size="10" fill="#6b7280">从堆顶取出</text>
  <text x="200" y="383" text-anchor="middle" font-size="10" fill="#6b7280">最高优先级 Pod</text>
  <line x1="200" y1="390" x2="200" y2="430" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="80" y="430" width="240" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="200" y="460" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">4. 遍历所有节点</text>
  <text x="200" y="478" text-anchor="middle" font-size="10" fill="#6b7280">检查资源、亲和性等</text>
  <text x="200" y="493" text-anchor="middle" font-size="10" fill="#6b7280">寻找合适节点</text>
  <line x1="200" y1="500" x2="200" y2="540" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="80" y="540" width="240" height="70" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="200" y="570" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">5. 绑定到节点</text>
  <text x="200" y="588" text-anchor="middle" font-size="10" fill="#059669">成功!</text>
  <text x="200" y="603" text-anchor="middle" font-size="10" fill="#6b7280">调度完成</text>
  <text x="680" y="80" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">失败路径</text>
  <line x1="320" y1="465" x2="560" y2="465" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="560" y="430" width="240" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="680" y="460" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">2B. 未找到节点</text>
  <text x="680" y="478" text-anchor="middle" font-size="10" fill="#dc2626">调度失败</text>
  <text x="680" y="493" text-anchor="middle" font-size="10" fill="#6b7280">进入 UnschedulablePool</text>
  <line x1="680" y1="500" x2="680" y2="540" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="730" y="525" font-size="9" fill="#6b7280">5分钟后/有变化</text>
  <rect x="560" y="540" width="240" height="70" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="680" y="570" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">3B. 进入 BackoffQ</text>
  <text x="680" y="588" text-anchor="middle" font-size="10" fill="#ea580c">等待指数退避</text>
  <text x="680" y="603" text-anchor="middle" font-size="10" fill="#6b7280">1s → 2s → 4s → 8s → 10s</text>
  <line x1="680" y1="610" x2="680" y2="650" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="730" y="635" font-size="9" fill="#6b7280">退避完成</text>
  <rect x="560" y="650" width="240" height="70" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="680" y="680" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">4B. 回到 ActiveQ</text>
  <text x="680" y="698" text-anchor="middle" font-size="10" fill="#6b7280">重新尝试调度</text>
  <text x="680" y="713" text-anchor="middle" font-size="10" fill="#6b7280">可能成功或再次失败</text>
  <path d="M 800 465 L 850 465 L 850 380 L 260 380 L 260 430" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="820" y="420" font-size="9" fill="#6b7280">再次遍历节点</text>
  <rect x="40" y="740" width="880" height="50" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="60" y="760" font-size="10" font-weight="600" fill="#111827">关键机制：</text>
  <text x="160" y="760" font-size="10" fill="#6b7280">• 条件变量实现阻塞等待</text>
  <text x="340" y="760" font-size="10" fill="#6b7280">• 堆结构保证优先级</text>
  <text x="520" y="760" font-size="10" fill="#6b7280">• 指数退避避免风暴</text>
  <text x="700" y="760" font-size="10" fill="#6b7280">• QueueingHint智能重试</text>
</svg>