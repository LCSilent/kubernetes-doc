<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <style>
    text { font-family: Helvetica Neue, Helvetica, Arial, sans-serif; }
  </style>
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Cache Update Flow - Sequence Diagram</text>
  <line x1="100" y1="70" x2="100" y2="580" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="50" y="70" width="100" height="30" rx="4" fill="#eff6ff" stroke="#2563eb"/>
  <text x="100" y="90" text-anchor="middle" font-size="11" font-weight="600">API Server</text>
  <line x1="300" y1="70" x2="300" y2="580" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="250" y="70" width="100" height="30" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="300" y="90" text-anchor="middle" font-size="11" font-weight="600">Informer</text>
  <line x1="500" y1="70" x2="500" y2="580" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="450" y="70" width="100" height="30" rx="4" fill="#f0fdf4" stroke="#059669"/>
  <text x="500" y="90" text-anchor="middle" font-size="11" font-weight="600">Cache</text>
  <line x1="700" y1="70" x2="700" y2="580" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5"/>
  <rect x="650" y="70" width="100" height="30" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="700" y="90" text-anchor="middle" font-size="11" font-weight="600">Scheduler</text>
  <text x="50" y="130" font-size="12" font-weight="700" fill="#059669">Pod Add Event</text>
  <rect x="50" y="140" width="200" height="80" rx="4" fill="#f0fdf4" stroke="#059669"/>
  <text x="60" y="160" font-size="10">1. AddPod(pod) called</text>
  <text x="60" y="175" font-size="10">2. Lock cache.mu</text>
  <text x="60" y="190" font-size="10">3. Add to podStates</text>
  <text x="60" y="205" font-size="10">4. NodeInfo.AddPod()</text>
  <line x1="150" y1="220" x2="250" y2="240" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="200" y="235" font-size="9">Add Event</text>
  <line x1="300" y1="240" x2="450" y2="260" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="375" y="255" font-size="9">Handler</text>
  <rect x="450" y="260" width="120" height="60" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="510" y="280" text-anchor="middle" font-size="10">AddPod(logger, pod)</text>
  <text x="510" y="295" text-anchor="middle" font-size="9">check assumedPods</text>
  <text x="510" y="310" text-anchor="middle" font-size="9">updatePod/addPod</text>
  <text x="50" y="360" font-size="12" font-weight="700" fill="#d97706">Node Update Event</text>
  <rect x="50" y="370" width="200" height="80" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="60" y="390" font-size="10">1. UpdateNode(old, new)</text>
  <text x="60" y="405" font-size="10">2. Lock cache.mu</text>
  <text x="60" y="420" font-size="10">3. Move to headNode</text>
  <text x="60" y="435" font-size="10">4. Increment Generation</text>
  <line x1="300" y1="450" x2="450" y2="470" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="375" y="465" font-size="9">Update Event</text>
  <rect x="450" y="470" width="120" height="60" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="510" y="490" text-anchor="middle" font-size="10">UpdateNode(logger)</text>
  <text x="510" y="505" text-anchor="middle" font-size="9">updateNodeTree</text>
  <text x="510" y="520" text-anchor="middle" font-size="9">updateImageStates</text>
  <text x="550" y="130" font-size="12" font-weight="700" fill="#7c3aed">Snapshot Update (Per Cycle)</text>
  <rect x="550" y="140" width="420" height="180" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="565" y="160" font-size="10" fill="#6b7280">Scheduling cycle starts:</text>
  <text x="565" y="180" font-size="10">1. UpdateSnapshot(logger, snapshot)</text>
  <text x="565" y="195" font-size="10">2. Lock cache.mu</text>
  <text x="565" y="210" font-size="10">3. forgetAllAssumedPods()</text>
  <text x="565" y="225" font-size="10">4. Iterate from headNode</text>
  <text x="565" y="240" font-size="10">5. Compare Generation numbers</text>
  <text x="565" y="255" font-size="10">6. Update if Generation > snapshotGen</text>
  <text x="565" y="270" font-size="10">7. Update lists only when needed</text>
  <text x="565" y="285" font-size="10" fill="#7c3aed" font-weight="600">Performance: O(changed) not O(all)</text>
  <text x="565" y="300" font-size="10" fill="#059669" font-weight="600">Result: 20-40% faster</text>
  <rect x="50" y="560" width="900" height="35" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="70" y="580" font-size="11" fill="#dc2626" font-weight="600">Key Insight:</text>
  <text x="180" y="580" font-size="10" fill="#6b7280">Doubly linked list + Generation tracking = Incremental snapshot updates</text>
</svg>